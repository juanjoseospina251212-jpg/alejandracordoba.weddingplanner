<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>María Alejandra Córdoba Gutiérrez</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#f8f5f1;
  color:#4a4036;
}

/* HERO CON IMAGEN */
.hero{
  height:100vh;
  background:url('https://images.unsplash.com/photo-1606800052052-a08af7148866?fm=jpg&q=60&w=3000') center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(255,255,255,0.6);
}

.hero-content{
  position:relative;
  animation:fadeUp 1s ease;
}

.hero h1{
  font-family:'Playfair Display',serif;
  font-size:52px;
}

.hero p{
  margin-top:10px;
  opacity:0.7;
}

.btn{
  margin-top:25px;
  padding:14px 30px;
  border-radius:30px;
  border:1px solid #c6a97e;
  background:transparent;
  cursor:pointer;
}

/* ANIMACIÓN */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* TEXTO */
.content{
  max-width:800px;
  margin:auto;
  padding:100px 20px;
  text-align:center;
  line-height:1.8;
}

/* CARRUSEL */
.carousel{
  position:relative;
  overflow:hidden;
  max-width:900px;
  margin:60px auto;
  border-radius:20px;
}

.track{
  display:flex;
  transition:transform 0.6s ease;
}

.track img{
  width:100%;
  height:500px;
  object-fit:cover;
}

/* FLECHAS */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#ffffffcc;
  border:none;
  font-size:24px;
  padding:12px;
  cursor:pointer;
  border-radius:50%;
}

.left{left:10px;}
.right{right:10px;}

/* FORM */
form{
  max-width:600px;
  margin:100px auto;
  display:grid;
  gap:15px;
}

input,textarea{
  padding:14px;
  border-radius:10px;
  border:1px solid #ddd;
}

button{
  padding:15px;
  border:none;
  border-radius:30px;
  background:#e8dfd4;
  cursor:pointer;
}

/* BOTÓN FLOTANTE */
.float{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#c6a97e;
  color:white;
  padding:15px 20px;
  border-radius:30px;
  text-decoration:none;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  opacity:0.6;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>María Alejandra Córdoba Gutiérrez</h1>
    <p>Wedding Planner · Experiencias únicas</p>
    <button class="btn">Cotiza tu evento</button>
  </div>
</section>

<!-- TEXTO -->
<section class="content">
  Creamos bodas que no solo se ven increíbles, sino que se sienten.
  Diseñamos cada detalle para transformar tu historia en una experiencia inolvidable.
</section>

<!-- CARRUSEL -->
<div class="carousel">
  <button class="arrow left">&#10094;</button>
  <div class="track">
    <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?fm=jpg&q=60&w=3000">
    <img src="https://luciasecasa.com/wp-content/uploads/2024/04/novios-boda-baile-e1716975372265-960x1183.jpg">
    <img src="https://images.squarespace-cdn.com/content/v1/56216fc2e4b059c47b425496/aeaa823f-5935-40a2-9d7d-8f6a4af0338a/Las+fotos+que+no+pueden+faltar+en+el+d%C3%ADa+de+tu+boda?format=2500w">
  </div>
  <button class="arrow right">&#10095;</button>
</div>

<!-- FORM -->
<form id="contactForm">
  <input name="nombre" placeholder="Nombre" required>
  <input name="email" placeholder="Email" required>
  <textarea name="mensaje" placeholder="Cuéntanos tu idea"></textarea>
  <button type="submit">Enviar</button>
</form>

<!-- BOTÓN FLOTANTE -->
<a class="float" href="https://wa.me/573046338009" target="_blank">Mensaje</a>

<footer>
  © 2026 · Wedding Planner · alecorgu11@gmail.com
</footer>

<script>
// CARRUSEL
const track = document.querySelector(".track");
const imgs = document.querySelectorAll(".track img");
let i = 0;

document.querySelector(".right").onclick = ()=>{
  i=(i+1)%imgs.length;
  track.style.transform=`translateX(-${i*100}%)`;
};

document.querySelector(".left").onclick = ()=>{
  i=(i-1+imgs.length)%imgs.length;
  track.style.transform=`translateX(-${i*100}%)`;
};

// FORM
document.querySelector("#contactForm").addEventListener("submit", async(e)=>{
  e.preventDefault();

  const f = e.target;

  const data = {
    nombre:f.nombre.value,
    email:f.email.value,
    mensaje:f.mensaje.value
  };

  await fetch("/api/leads",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("Mensaje enviado");
  f.reset();
});
</script>

</body>
</html>
