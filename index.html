<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #faf8f5;
  color: #5a4d42;
}

header {
  text-align: center;
  padding: 100px 20px;
  background: linear-gradient(to bottom, #ffffff, #f5efe9);
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  margin: 0;
}

.subtitle {
  margin-top: 10px;
  font-size: 18px;
  opacity: 0.7;
}

.section {
  padding: 80px 20px;
  max-width: 1100px;
  margin: auto;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 20px;
  object-fit: cover;
  height: 300px;
}

form {
  display: grid;
  gap: 15px;
  max-width: 600px;
  margin: auto;
}

input, textarea {
  padding: 14px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-family: inherit;
}

button {
  background: #e8dfd4;
  border: none;
  padding: 15px;
  border-radius: 30px;
  cursor: pointer;
  font-weight: 500;
  transition: 0.3s;
}

button:hover {
  background: #d8cfc4;
}

footer {
  text-align: center;
  padding: 40px;
  font-size: 14px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>Wedding Planner</h1>
  <div class="subtitle">Creamos bodas elegantes, íntimas y memorables</div>
</header>

<section class="section">
  <h2 style="text-align:center;font-family:'Playfair Display';">Galería</h2>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?fm=jpg&q=60&w=3000">
    <img src="https://luciasecasa.com/wp-content/uploads/2024/04/novios-boda-baile-e1716975372265-960x1183.jpg">
    <img src="https://images.squarespace-cdn.com/content/v1/56216fc2e4b059c47b425496/aeaa823f-5935-40a2-9d7d-8f6a4af0338a/Las+fotos+que+no+pueden+faltar+en+el+d%C3%ADa+de+tu+boda?format=2500w">
  </div>
</section>

<section class="section">
  <h2 style="text-align:center;font-family:'Playfair Display';">Contáctanos</h2>

  <form id="contactForm">
    <input name="nombre" placeholder="Nombre completo" required>
    <input name="email" type="email" placeholder="Correo electrónico" required>
    <input name="telefono" placeholder="Teléfono">
    <input name="fecha" type="date">
    <input name="ubicacion" placeholder="Ciudad del evento">
    <input name="invitados" placeholder="Número de invitados">
    <textarea name="mensaje" placeholder="Cuéntanos tu idea..." required></textarea>
    <button type="submit">Enviar mensaje</button>
  </form>
</section>

<footer>
  © 2026 Wedding Planner | alecorgu11@gmail.com | +57 304 6338009
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const form = document.querySelector("#contactForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const btn = form.querySelector("button");
    const originalText = btn.innerText;

    btn.innerText = "Enviando...";
    btn.disabled = true;

    const data = {
      nombre: form.nombre.value.trim(),
      email: form.email.value.trim(),
      telefono: form.telefono.value.trim(),
      fecha: form.fecha.value,
      ubicacion: form.ubicacion.value.trim(),
      invitados: form.invitados.value.trim(),
      mensaje: form.mensaje.value.trim()
    };

    try {
      const res = await fetch("/api/leads", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      if (!res.ok) throw new Error();

      alert("Mensaje enviado ✨");
      form.reset();

    } catch {
      alert("Error al enviar");
    }

    btn.innerText = originalText;
    btn.disabled = false;
  });
});
</script>

</body>
</html>
